# 1. Backend Settings: Tells the CMS to talk directly to your GitHub repo
backend:
  name: github
  repo: https://github.com/mezishir/TNValleyMRR # Change this to your actual repo
  branch: main # The branch where site files live

# 2. Media Settings: Where images uploaded by the club will be saved
media_folder: "images"
public_folder: "/images"

# 3. Collections: Defines the dashboards the club members will see
collections:
  - name: "blog" # Used internally by code
    label: "Layout Blog" # The tab name members click in the dashboard
    folder: "_posts" # The folder in GitHub where files will be created
    create: true # Allows members to add new posts
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # How the markdown file will be named
    fields: # The exact form fields the club members will fill out
      - { label: "Post Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Layout Photo", name: "thumbnail", widget: "image" }
      - { label: "Author (Your Name)", name: "author", widget: "string", default: "Club Member" }
      - { label: "Blog Text", name: "body", widget: "markdown" }

  - name: "events"
    label: "Town Events & Open Houses"
    folder: "_events"
    create: true
    slug: "event-{{year}}-{{month}}-{{day}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Event Date & Time", name: "event_date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string", default: "Clubhouse" }
      - { label: "Event Flyer / Image", name: "image", widget: "image", required: false }
      - { label: "Event Description", name: "body", widget: "markdown" }
name: Gallery Asset Optimize

on:
  push:
    branches:
      - main
    paths:
      - 'images/gallery/**'
      - '.github/workflows/gallery-video-transcode.yml'
      - 'main.js'
      - 'gallery.json'

jobs:
  optimize-gallery-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create gallery-web output folder
        run: |
          mkdir -p images/gallery-web
          rm -f images/gallery-web/*

      - name: Convert gallery images to WebP
        run: |
          set -e
          shopt -s nocaseglob
          for src in images/gallery/*; do
            if [[ -f "$src" ]]; then
              ext="${src##*.}"
              case "${ext,,}" in
                jpg|jpeg|png|gif|webp|avif|svg)
                  filename="$(basename "$src")"
                  out="images/gallery-web/${filename%.*}.webp"
                  ffmpeg -y -i "$src" -vf "scale='min(1200,iw)':-2" -c:v libwebp -lossless 0 -q:v 75 -compression_level 6 "$out"
                  ;;
                *)
                  ;;
              esac
            fi
          done

      - name: Generate gallery manifest
        run: |
          python3 - <<'PY'
import json
from pathlib import Path

gallery = []
root = Path('images/gallery')
processed = Path('images/gallery-web')
processed_map = {p.stem: p.name for p in processed.iterdir() if p.is_file()}

for path in sorted(root.iterdir()):
    if not path.is_file():
        continue
    ext = path.suffix.lower()
    if ext in {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.avif', '.svg'}:
        output_name = processed_map.get(path.stem)
        if output_name:
            gallery.append({'type': 'image', 'src': f'/images/gallery-web/{output_name}'})
    # ignore non-image files for gallery output

Path('gallery.json').write_text(json.dumps(gallery, indent=2), encoding='utf-8')
PY

      - name: Commit optimized images and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gallery.json images/gallery-web
          if ! git diff --cached --quiet; then
            git commit -m "Auto-convert gallery images to WebP and update manifest [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
